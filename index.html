<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CET-4 英语学习平台 - 四级备考助手</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
    .app-container { background: white; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); overflow: hidden; max-width: 1200px; margin: 0 auto; }
    .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 24px; text-align: center; }
    .header h1 { font-size: 28px; margin-bottom: 8px; }
    .nav-tabs { display: flex; background: #f8f9fa; border-bottom: 1px solid #e9ecef; }
    .nav-tab { flex: 1; padding: 16px; border: none; background: transparent; cursor: pointer; font-size: 16px; font-weight: 500; color: #495057; transition: all 0.3s; }
    .nav-tab:hover { background: #e9ecef; }
    .nav-tab.active { background: white; color: #667eea; border-bottom: 3px solid #667eea; }
    .content { padding: 24px; }
    .module-selector { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .module-card { padding: 24px; border: 2px solid #e9ecef; border-radius: 12px; cursor: pointer; transition: all 0.3s; text-align: center; }
    .module-card:hover { border-color: #667eea; transform: translateY(-2px); }
    .module-card.selected { border-color: #667eea; background: linear-gradient(135deg, rgba(102,126,234,0.1) 0%, rgba(118,75,162,0.1) 100%); }
    .module-card h3 { color: #333; margin-bottom: 8px; }
    .module-card p { color: #666; font-size: 14px; }
    .question-list { display: flex; flex-direction: column; gap: 12px; }
    .question-item { padding: 16px; border: 1px solid #e9ecef; border-radius: 8px; cursor: pointer; transition: all 0.3s; display: flex; justify-content: space-between; align-items: center; }
    .question-item:hover { border-color: #667eea; background: #f8f9fa; }
    .question-item.completed { background: #e8f5e9; border-color: #4caf50; }
    .question-item .status { font-size: 12px; padding: 4px 8px; border-radius: 4px; }
    .question-item .status.correct { background: #4caf50; color: white; }
    .question-item .status.incorrect { background: #f44336; color: white; }
    .practice-area { background: #f8f9fa; border-radius: 12px; padding: 24px; }
    .content-display { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; border-left: 4px solid #667eea; white-space: pre-line; line-height: 1.8; }
    .question-text { font-size: 18px; font-weight: 600; color: #333; margin-bottom: 20px; }
    .options-list { display: flex; flex-direction: column; gap: 12px; }
    .option-item { display: flex; align-items: center; padding: 14px 18px; border: 2px solid #e9ecef; border-radius: 8px; cursor: pointer; transition: all 0.3s; }
    .option-item:hover { border-color: #667eea; }
    .option-item.selected { border-color: #667eea; background: rgba(102,126,234,0.1); }
    .option-item.correct { border-color: #4caf50; background: #e8f5e9; }
    .option-item.incorrect { border-color: #f44336; background: #ffebee; }
    .option-label { width: 30px; height: 30px; border-radius: 50%; background: #e9ecef; display: flex; align-items: center; justify-content: center; font-weight: 600; margin-right: 12px; flex-shrink: 0; }
    .option-item.selected .option-label { background: #667eea; color: white; }
    .option-item.correct .option-label { background: #4caf50; color: white; }
    .option-item.incorrect .option-label { background: #f44336; color: white; }
    .action-buttons { display: flex; gap: 12px; margin-top: 20px; }
    .btn { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: 500; transition: all 0.3s; }
    .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(102,126,234,0.4); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-secondary { background: #e9ecef; color: #495057; }
    .btn-secondary:hover { background: #dee2e6; }
    .feedback-section { margin-top: 20px; padding: 20px; border-radius: 8px; animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    .feedback-section.correct { background: #e8f5e9; border: 2px solid #4caf50; }
    .feedback-section.incorrect { background: #ffebee; border: 2px solid #f44336; }
    .feedback-title { font-size: 18px; font-weight: 600; margin-bottom: 12px; }
    .feedback-section.correct .feedback-title { color: #2e7d32; }
    .feedback-section.incorrect .feedback-title { color: #c62828; }
    .feedback-analysis { color: #555; line-height: 1.6; }
    .stats-panel { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; text-align: center; }
    .stat-item h4 { font-size: 28px; margin-bottom: 4px; }
    .stat-item p { opacity: 0.9; font-size: 14px; }
    .back-btn { display: inline-flex; align-items: center; gap: 8px; margin-bottom: 16px; padding: 8px 16px; background: #e9ecef; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; color: #495057; transition: all 0.3s; }
    .back-btn:hover { background: #dee2e6; }
    .filter-section { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .filter-btn { padding: 8px 16px; border: 2px solid #e9ecef; background: white; border-radius: 20px; cursor: pointer; font-size: 14px; transition: all 0.3s; }
    .filter-btn:hover { border-color: #667eea; }
    .filter-btn.active { background: #667eea; color: white; border-color: #667eea; }
    .empty-state { text-align: center; padding: 60px 20px; color: #666; }
    .empty-state h3 { margin-bottom: 12px; color: #333; }
    textarea.writing-input { width: 100%; min-height: 200px; padding: 16px; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; line-height: 1.6; font-family: inherit; }
    .word-count { margin-top: 8px; color: #666; font-size: 14px; }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="header">
      <h1>📚 CET-4 英语学习平台</h1>
      <p>College English Test Band 4</p>
    </div>

    <div class="nav-tabs">
      <button class="nav-tab active" onclick="switchTab('listening')">🎧 听力</button>
      <button class="nav-tab" onclick="switchTab('reading')">📖 阅读</button>
      <button class="nav-tab" onclick="switchTab('writing')">✍️ 写作</button>
    </div>

    <div class="content" id="content">
      <!-- 内容由 JavaScript 动态生成 -->
    </div>
  </div>

  <script>
    // ============== 听力数据 ==============
    const listeningData = {
      "short-dialog": [
        {"id":"s1","dialogue":"M: Can I help you?\nW: Yes, I'm looking for a book on history.","question":"What is the woman looking for?","options":["A book on science","A book on history","A dictionary","A magazine"],"answer":"B","analysis":"关键词 'book on history' 直接回答了问题"},
        {"id":"s2","dialogue":"M: What time is it now?\nW: It's 7:30. The movie starts at 8:00.","question":"How much time do they have before the movie?","options":["15 minutes","30 minutes","45 minutes","60 minutes"],"answer":"B","analysis":"8:00 - 7:30 = 30 分钟"},
        {"id":"s3","dialogue":"W: I'm so tired. I stayed up late last night.\nM: You should go to bed earlier tonight.","question":"What does the man suggest?","options":["Watch a movie","Go to bed earlier","Drink coffee","Take a nap"],"answer":"B","analysis":"男士建议女士今晚早点睡觉"},
        {"id":"s4","dialogue":"M: How do you usually go to work?\nW: I take the subway. It's faster than the bus.","question":"Why does the woman take the subway?","options":["It's cheaper","It's faster","It's more comfortable","It's closer"],"answer":"B","analysis":"女士明确说 'It's faster than the bus'"},
        {"id":"s5","dialogue":"W: Did you finish your homework?\nM: Not yet. I'll do it after dinner.","question":"When will the man do his homework?","options":["Before dinner","After dinner","Tomorrow","Later tonight"],"answer":"B","analysis":"男士说 'I'll do it after dinner'"},
        {"id":"s6","dialogue":"M: Would you like some coffee?\nW: No, thanks. I prefer tea.","question":"What does the woman prefer?","options":["Coffee","Tea","Water","Juice"],"answer":"B","analysis":"女士说 'I prefer tea'"},
        {"id":"s7","dialogue":"W: How was your trip to Beijing?\nM: It was wonderful. I visited the Great Wall.","question":"What did the man visit?","options":["The Summer Palace","The Great Wall","The Forbidden City","Tiananmen Square"],"answer":"B","analysis":"男士说 'I visited the Great Wall'"},
        {"id":"s8","dialogue":"M: Are you free this weekend?\nW: Sorry, I have to prepare for an exam.","question":"What will the woman do this weekend?","options":["Go shopping","Prepare for an exam","Visit friends","Watch a movie"],"answer":"B","analysis":"女士说 'I have to prepare for an exam'"},
        {"id":"s9","dialogue":"W: What's your major?\nM: I'm studying computer science.","question":"What is the man's major?","options":["English","Computer Science","Mathematics","Physics"],"answer":"B","analysis":"男士说 'I'm studying computer science'"},
        {"id":"s10","dialogue":"M: Do you like playing basketball?\nW: Yes, I play it every weekend.","question":"How often does the woman play basketball?","options":["Every day","Every week","Every weekend","Every month"],"answer":"C","analysis":"女士说 'I play it every weekend'"}
      ],
      "long-dialog": [
        {"id":"l1","dialogue":"W: Good morning. I'd like to inquire about the English course.\nM: Good morning. We have several courses available. What level are you looking for?\nW: I'm a beginner. I want to improve my speaking skills.\nM: Then I recommend our Basic English Communication course. It starts next Monday.\nW: That sounds good. How many students are there in one class?\nM: Usually around 15 students. This ensures everyone gets enough practice time.\nW: Perfect. How much is the course fee?\nM: It's 2000 yuan for 12 weeks. And we offer a free trial class.\nW: Great! I'd like to sign up for the trial class first.\nM: No problem. Let me get your information.","questions":[{"question":"What does the woman want to improve?","options":["Writing skills","Speaking skills","Listening skills","Reading skills"],"answer":"B","analysis":"女士说 'I want to improve my speaking skills'"},{"question":"How many students are in one class?","options":["About 10","About 15","About 20","About 25"],"answer":"B","analysis":"男士说 'Usually around 15 students'"},{"question":"How much is the course fee?","options":["1000 yuan","1500 yuan","2000 yuan","2500 yuan"],"answer":"C","analysis":"男士说 'It's 2000 yuan for 12 weeks'"}]},
        {"id":"l2","dialogue":"M: Hi, Lucy. You look worried. What's wrong?\nW: I'm thinking about which course to choose next semester.\nM: What are your options?\nW: Well, I can choose between Marketing and Human Resources. I'm interested in both.\nM: Have you talked to your academic advisor?\nW: Yes, she suggested Marketing because it has more job opportunities.\nM: That sounds reasonable. But you should also consider your own interest.\nW: You're right. I need to think about it carefully.\nM: Why not talk to some seniors who have taken these courses?\nW: Good idea! I'll do that this weekend.","questions":[{"question":"What is the woman worried about?","options":["Her grades","Choosing a course","Finding a job","Talking to advisor"],"answer":"B","analysis":"女士说 'I'm thinking about which course to choose'"},{"question":"Which course does the advisor suggest?","options":["Human Resources","Marketing","Finance","Management"],"answer":"B","analysis":"女士说 'she suggested Marketing'"},{"question":"What will the woman do this weekend?","options":["Choose a course","Talk to seniors","Meet the advisor","Study for exam"],"answer":"B","analysis":"女士说 'I'll do that this weekend'，指和学长学姐交流"}]}
      ],
      "passage": [
        {"id":"p1","passage":"Sleep is essential for our health and well-being. Studies have shown that people who get enough sleep are more productive, have better memory, and are less likely to get sick. However, in today's fast-paced world, many people sacrifice sleep to get more work done.\n\nAccording to research, adults need between 7 and 9 hours of sleep each night. Unfortunately, about one-third of adults report getting less than 7 hours of sleep. This lack of sleep can lead to serious health problems, including heart disease, diabetes, and obesity.\n\nExperts recommend establishing a regular sleep schedule and avoiding screens before bedtime. Creating a comfortable sleep environment and avoiding caffeine in the afternoon can also help improve sleep quality.","questions":[{"question":"What is the main idea of the passage?","options":["Sleep is not important","Sleep is essential and lack of it causes problems","Everyone should sleep more than 10 hours","Only children need enough sleep"],"answer":"B","analysis":"文章主要讲述了睡眠对健康的重要性以及睡眠不足带来的问题"},{"question":"How many hours of sleep do adults need?","options":["5-6 hours","7-9 hours","10-12 hours","Less than 7 hours"],"answer":"B","analysis":"文中明确提到 adults need between 7 and 9 hours"},{"question":"What health problems can lack of sleep cause?","options":["Only cold","Heart disease, diabetes, obesity","Only headache","No problems"],"answer":"B","analysis":"文中提到 heart disease, diabetes, and obesity"}]},
        {"id":"p2","passage":"The Internet has changed the way we communicate and access information. With just a few clicks, we can connect with people around the world, shop online, and find answers to almost any question.\n\nHowever, the Internet also has its downsides. Privacy concerns, cybercrime, and the spread of misinformation are serious issues that need to be addressed. Many people spend too much time online, which can affect their real-life relationships and mental health.\n\nDespite these challenges, the Internet remains an invaluable tool. The key is to use it wisely and maintain a healthy balance between online and offline activities.","questions":[{"question":"What is the main advantage of the Internet?","options":["It's cheap","It connects people and provides information","It's fast","It's entertaining"],"answer":"B","analysis":"文章提到 connect with people 和 find answers"},
        {"question":"What is NOT mentioned as a downside of the Internet?","options":["Privacy concerns","Cybercrime","Misinformation","High cost"],"answer":"D","analysis":"文章没有提到高成本问题"},
        {"question":"What does the author suggest?","options":["Stop using the Internet","Use it wisely and maintain balance","Use it more often","Avoid online shopping"],"answer":"B","analysis":"文章最后说 use it wisely and maintain a healthy balance"}]}
      ]
    };

    // ============== 阅读数据 ==============
    const readingData = {
      "careful-reading": [
        {"id":"r1","title":"The Importance of Sleep","passage":"Sleep is essential for our health and well-being. Studies have shown that people who get enough sleep are more productive, have better memory, and are less likely to get sick. However, in today's fast-paced world, many people sacrifice sleep to get more work done.\n\nAccording to research, adults need between 7 and 9 hours of sleep each night. Unfortunately, about one-third of adults report getting less than 7 hours of sleep. This lack of sleep can lead to serious health problems, including heart disease, diabetes, and obesity.\n\nExperts recommend establishing a regular sleep schedule and avoiding screens before bedtime. Creating a comfortable sleep environment and avoiding caffeine in the afternoon can also help improve sleep quality.","questions":[{"id":1,"question":"What is the main idea of the passage?","options":["A. Sleep is not important for health","B. Sleep is essential and lack of it causes problems","C. Everyone should sleep more than 10 hours","D. Only children need enough sleep"],"answer":"B","analysis":"文章主要讲述了睡眠对健康的重要性以及睡眠不足带来的问题"},{"id":2,"question":"How many hours of sleep do adults need according to the passage?","options":["A. 5-6 hours","B. 7-9 hours","C. 10-12 hours","D. Less than 7 hours"],"answer":"B","analysis":"文中明确提到 adults need between 7 and 9 hours of sleep each night"},{"id":3,"question":"What percentage of adults get less than 7 hours of sleep?","options":["A. About 10%","B. About one-third","C. About half","D. About two-thirds"],"answer":"B","analysis":"文中提到 about one-third of adults report getting less than 7 hours"}]},
        {"id":"r2","title":"Online Learning Revolution","passage":"The COVID-19 pandemic has accelerated the adoption of online learning worldwide. Schools and universities had to quickly adapt to remote teaching, and many students experienced online classes for the first time.\n\nWhile online learning offers flexibility and convenience, it also presents challenges. Some students struggle with self-discipline and time management without the structure of traditional classrooms. Additionally, not all students have access to reliable internet connections or suitable devices for learning.\n\nDespite these challenges, many educators believe that online learning will continue to grow even after the pandemic. The combination of online and in-person learning, known as hybrid learning, may become the new normal in education.","questions":[{"id":1,"question":"What caused the rapid growth of online learning?","options":["A. Government policy","B. COVID-19 pandemic","C. Student demand","D. Technology advancement"],"answer":"B","analysis":"文中明确提到 COVID-19 pandemic accelerated the adoption of online learning"},{"id":2,"question":"What is an advantage of online learning?","options":["A. Better social interaction","B. Flexibility and convenience","C. Lower cost","D. Easier exams"],"answer":"B","analysis":"文中提到 online learning offers flexibility and convenience"},{"id":3,"question":"What challenge do some students face?","options":["A. Too many breaks","B. Self-discipline and time management","C. Easy course content","D. Too much interaction"],"answer":"B","analysis":"文中提到 students struggle with self-discipline and time management"}]}
      ],
      "matching": [
        {"id":"m1","title":"The Future of Work","paragraphs":[{"letter":"A","content":"The workplace is undergoing a dramatic transformation. Remote work, once considered a rare perk, has become mainstream."},{"letter":"B","content":"Artificial intelligence and automation are reshaping job requirements. While some fear job losses, experts predict new roles will be created."},{"letter":"C","content":"Soft skills like communication, creativity, and emotional intelligence are becoming increasingly valuable."},{"letter":"D","content":"The gig economy continues to grow, with more people working as freelancers or independent contractors."},{"letter":"E","content":"Companies are investing heavily in employee training and development. Continuous learning is no longer optional."}],"statements":[{"id":1,"statement":"Remote work has changed from being uncommon to being widely accepted.","answer":"A","analysis":"段落 A 提到 remote work, once considered a rare perk, has become mainstream"},{"id":2,"statement":"Human skills that machines cannot replace are becoming more important.","answer":"C","analysis":"段落 C 提到 Soft skills...are becoming increasingly valuable"},{"id":3,"statement":"More people are working independently rather than as traditional employees.","answer":"D","analysis":"段落 D 提到 gig economy 和 freelancers"}]}
      ],
      "banked-cloze": [
        {"id":"c1","title":"Social Media Impact","passage":"Social media has ___1___ the way we communicate and share information. With billions of users worldwide, platforms like Facebook, Instagram, and Twitter have become an ___2___ part of daily life for many people.\n\nHowever, the impact of social media is not entirely positive. Studies have shown that ___3___ use of social media can lead to feelings of anxiety and depression. The ___4___ to compare oneself with others can negatively affect self-esteem.\n\nOn the other hand, social media has enabled people to stay ___5___ with friends and family across the globe. It has also become a powerful tool for businesses to reach customers and for social movements to gain ___6___.","wordBank":[{"letter":"A","word":"excessive"},{"letter":"B","word":"transformed"},{"letter":"C","word":"essential"},{"letter":"D","word":"connected"},{"letter":"E","word":"negative"},{"letter":"F","word":"wisely"},{"letter":"G","word":"visibility"},{"letter":"H","word":"tendency"}],"answers":[{"blank":1,"answer":"B","word":"transformed","analysis":"transformed the way... 改变了...的方式"},{"blank":2,"answer":"C","word":"essential","analysis":"an essential part 不可或缺的一部分"},{"blank":3,"answer":"A","word":"excessive","analysis":"excessive use 过度使用"},{"blank":4,"answer":"H","word":"tendency","analysis":"tendency to compare 比较的倾向"},{"blank":5,"answer":"D","word":"connected","analysis":"stay connected 保持联系"},{"blank":6,"answer":"G","word":"visibility","analysis":"gain visibility 获得关注/曝光度"}]}
      ]
    };

    // ============== 写作数据 ==============
    const writingData = {
      exercises: [
        {"id":"w1","type":"argumentative","title":"The Importance of Learning English","requirements":"请以\"学习英语的重要性\"为题，写一篇 120-180 词的议论文。","keywords":["globalization", "communication", "career", "opportunity"],"sampleEssay":"Nowadays, English has become a hot topic in our society. With the development of globalization, English plays an increasingly important role in our daily life.\n\nFirst and foremost, English is widely used in international communication. As the most common language in the world, it enables people from different countries to communicate effectively. Furthermore, learning English can help us access more knowledge and information, as most academic papers and online resources are written in English. Last but not least, English proficiency can significantly improve our career prospects, as many multinational companies require employees who can speak English fluently.\n\nIn conclusion, learning English is of great significance to everyone. We should seize every opportunity to improve our English skills and broaden our horizons.","wordCount":126},
        {"id":"w2","type":"letter","title":"Letter of Application","requirements":"假设你是李华，看到某公司招聘实习生的广告，请写一封求职信（100-120 词）。","keywords":["apply for", "position", "qualification", "experience"],"sampleEssay":"Dear Sir/Madam,\n\nI am writing to apply for the position of intern advertised on your company website. I believe my qualifications and enthusiasm make me a suitable candidate for this position.\n\nI am currently a junior student majoring in Computer Science. During my university years, I have achieved excellent academic performance and participated in several programming competitions. I am proficient in Python, Java, and web development. Moreover, I am a quick learner with strong problem-solving skills and team spirit.\n\nI would appreciate the opportunity to discuss my application with you. I am available for an interview at your convenience. Thank you for your consideration.\n\nYours sincerely,\nLi Hua","wordCount":112}
      ]
    };

    // ============== 状态 ==============
    let currentTab = 'listening';
    let currentModule = null;
    let currentIndex = 0;
    let selectedAnswer = null;
    let submitted = false;
    let userAnswers = [];
    let writingContent = '';
    let showSample = false;

    // ============== 渲染函数 ==============
    function render() {
      const content = document.getElementById('content');
      
      if (currentTab === 'listening') {
        if (currentModule) {
          content.innerHTML = renderListeningPractice();
        } else {
          content.innerHTML = renderListeningHome();
        }
      } else if (currentTab === 'reading') {
        if (currentModule) {
          content.innerHTML = renderReadingPractice();
        } else {
          content.innerHTML = renderReadingHome();
        }
      } else if (currentTab === 'writing') {
        content.innerHTML = renderWriting();
      }
    }

    function renderListeningHome() {
      return `
        <div class="module-selector">
          <div class="module-card" onclick="selectModule('short-dialog')"><h3>短对话</h3><p>10 道题</p></div>
          <div class="module-card" onclick="selectModule('long-dialog')"><h3>长对话</h3><p>2 篇</p></div>
          <div class="module-card" onclick="selectModule('passage')"><h3>短文听力</h3><p>2 篇</p></div>
        </div>
        <div class="filter-section">
          <button class="filter-btn active" onclick="setFilter('all')">全部</button>
          <button class="filter-btn" onclick="setFilter('short-dialog')">短对话</button>
          <button class="filter-btn" onclick="setFilter('long-dialog')">长对话</button>
          <button class="filter-btn" onclick="setFilter('passage')">短文</button>
        </div>
        ${renderQuestionList()}
      `;
    }

    function renderQuestionList() {
      const allQuestions = [...listeningData['short-dialog'].map(q => ({...q, type: 'short-dialog'})), ...listeningData['long-dialog'].map(q => ({...q, type: 'long-dialog'})), ...listeningData['passage'].map(q => ({...q, type: 'passage'}))];
      return `<div class="question-list">${allQuestions.map((q, i) => `<div class="question-item" onclick="selectQuestion(${i})"><span>${q.type === 'short-dialog' ? '短对话' : q.type === 'long-dialog' ? '长对话' : '短文'} - ${i + 1}</span></div>`).join('')}</div>`;
    }

    function renderListeningPractice() {
      const questions = listeningData[currentModule] || [];
      const question = questions[currentIndex];
      if (!question) return '<div class="empty-state"><h3>暂无题目</h3></div>';

      const contentText = question.dialogue || question.passage;
      const currentQuestion = question.type === 'short-dialog' ? question : (question.questions ? question.questions[0] : null);
      const questionText = question.type === 'short-dialog' ? question.question : `问题 1/${question.questions.length}: ${question.questions[0].question}`;
      const options = question.type === 'short-dialog' ? question.options : question.questions[0].options;
      const correctAnswer = question.type === 'short-dialog' ? question.answer : question.questions[0].answer;
      const analysis = question.type === 'short-dialog' ? question.analysis : question.questions[0].analysis;

      return `
        <div class="practice-area">
          <button class="back-btn" onclick="backToList()">← 返回列表</button>
          <div class="content-display">${contentText}</div>
          <div class="question-text">${questionText}</div>
          <div class="options-list">
            ${options.map((opt, i) => {
              const label = String.fromCharCode(65 + i);
              const isSelected = selectedAnswer === label;
              let className = 'option-item';
              if (submitted) {
                if (label === correctAnswer) className += ' correct';
                else if (isSelected) className += ' incorrect';
              } else if (isSelected) {
                className += ' selected';
              }
              return `<div class="${className}" onclick="selectAnswer('${label}')"><div class="option-label">${label}</div><div>${opt}</div></div>`;
            }).join('')}
          </div>
          ${submitted ? `
            <div class="feedback-section ${selectedAnswer === correctAnswer ? 'correct' : 'incorrect'}">
              <div class="feedback-title">${selectedAnswer === correctAnswer ? '✓ 回答正确！' : '✗ 回答错误'}</div>
              <div class="feedback-analysis"><strong>正确答案：</strong> ${correctAnswer}<br><strong>解析：</strong> ${analysis}</div>
            </div>
          ` : ''}
          <div class="action-buttons">
            ${!submitted ? `<button class="btn btn-primary" onclick="submitAnswer()" ${!selectedAnswer ? 'disabled' : ''}>提交答案</button>` : `<button class="btn btn-primary" onclick="nextQuestion()">下一题</button>`}
            <button class="btn btn-secondary" onclick="backToModules()">返回模块选择</button>
          </div>
        </div>
      `;
    }

    function renderReadingHome() {
      return `
        <div class="module-selector">
          <div class="module-card" onclick="selectReadingModule('careful-reading')"><h3>仔细阅读</h3><p>2 篇</p></div>
          <div class="module-card" onclick="selectReadingModule('matching')"><h3>长篇匹配</h3><p>1 篇</p></div>
          <div class="module-card" onclick="selectReadingModule('banked-cloze')"><h3>选词填空</h3><p>1 篇</p></div>
        </div>
        ${renderReadingList()}
      `;
    }

    function renderReadingList() {
      const allQuestions = [...(readingData['careful-reading'] || []).map(q => ({...q, type: 'careful-reading'})), ...(readingData['matching'] || []).map(q => ({...q, type: 'matching'})), ...(readingData['banked-cloze'] || []).map(q => ({...q, type: 'banked-cloze'}))];
      return `<div class="question-list">${allQuestions.map((q, i) => `<div class="question-item" onclick="selectReadingQuestion(${i})"><span>${q.type === 'careful-reading' ? '仔细阅读' : q.type === 'matching' ? '长篇匹配' : '选词填空'} - ${q.title || '练习'}</span></div>`).join('')}</div>`;
    }

    function renderReadingPractice() {
      const questions = readingData[currentModule] || [];
      const question = questions[currentIndex];
      if (!question) return '<div class="empty-state"><h3>暂无题目</h3></div>';

      if (currentModule === 'careful-reading') {
        return `
          <div class="practice-area">
            <button class="back-btn" onclick="backToReadingList()">← 返回列表</button>
            <div class="content-display"><h3 style="margin-bottom:12px">${question.title}</h3>${question.passage}</div>
            <div class="question-list" style="margin-top:20px">
              ${question.questions.map((q, qi) => `
                <div style="background:white;padding:16px;border-radius:8px;margin-bottom:16px">
                  <p style="font-weight:600;margin-bottom:12px">${qi + 1}. ${q.question}</p>
                  <div class="options-list">
                    ${q.options.map((opt, oi) => {
                      const label = opt.charAt(0);
                      return `<div class="option-item" onclick="alert('阅读模块答案验证功能待完善')"><div class="option-label">${label}</div><div>${opt.substring(3)}</div></div>`;
                    }).join('')}
                  </div>
                </div>
              `).join('')}
            </div>
            <div class="action-buttons">
              <button class="btn btn-primary" onclick="backToReadingList()">完成</button>
            </div>
          </div>
        `;
      } else if (currentModule === 'matching') {
        return `
          <div class="practice-area">
            <button class="back-btn" onclick="backToReadingList()">← 返回列表</button>
            <div class="content-display">${question.paragraphs.map(p => `<p><strong>段落${p.letter}:</strong> ${p.content}</p>`).join('')}</div>
            <div class="question-list">
              ${question.statements.map((s, i) => `<div class="question-item"><span>${i+1}. ${s.statement}</span><span class="status correct">答案：段落${s.answer}</span></div>`).join('')}
            </div>
          </div>
        `;
      } else if (currentModule === 'banked-cloze') {
        return `
          <div class="practice-area">
            <button class="back-btn" onclick="backToReadingList()">← 返回列表</button>
            <div class="content-display">${question.passage}</div>
            <div style="margin-bottom:16px"><strong>词库：</strong>${question.wordBank.map(w => `${w.letter}. ${w.word}`).join(', ')}</div>
            <div class="question-list">
              ${question.answers.map((a, i) => `<div class="question-item"><span>第${a.blank}空</span><span class="status correct">答案：${a.answer} (${a.word})</span></div>`).join('')}
            </div>
          </div>
        `;
      }
      return '<div class="empty-state"><h3>暂无题目</h3></div>';
    }

    function renderWriting() {
      if (writingData.exercises[currentModule] !== undefined) {
        const ex = writingData.exercises[currentModule];
        return `
          <div class="practice-area">
            <button class="back-btn" onclick="backToWritingList()">← 返回列表</button>
            <div class="content-display">
              <h3 style="margin-bottom:12px">${ex.title}</h3>
              <p>${ex.requirements}</p>
            </div>
            <div style="margin-bottom:12px"><p><strong>关键词：</strong>${ex.keywords.join(', ')}</p></div>
            <textarea class="writing-input" placeholder="在此输入你的作文..." oninput="updateWritingContent(this.value)">${writingContent}</textarea>
            <div class="word-count">已输入 ${writingContent.split(/\s+/).filter(w => w).length} 词（建议 120-180 词）</div>
            <div class="action-buttons">
              <button class="btn btn-primary" onclick="toggleSample()">${showSample ? '隐藏范文' : '查看范文'}</button>
              <button class="btn btn-secondary" onclick="clearWriting()">清空内容</button>
            </div>
            ${showSample ? `
              <div class="content-display" style="margin-top:20px;background:#e8f5e9;border-left-color:#4caf50">
                <h4 style="margin-bottom:12px">📝 参考范文（${ex.wordCount}词）</h4>
                <p>${ex.sampleEssay}</p>
              </div>
            ` : ''}
          </div>
        `;
      }
      return `
        <div class="module-selector">
          <div class="module-card" onclick="selectWritingExercise(0)"><h3>议论文</h3><p>观点论述型作文</p></div>
          <div class="module-card" onclick="selectWritingExercise(1)"><h3>应用文</h3><p>书信/通知等</p></div>
        </div>
        <div class="question-list">
          ${writingData.exercises.map((ex, i) => `<div class="question-item" onclick="selectWritingExercise(${i})"><span>${ex.type === 'argumentative' ? '议论文' : '应用文'} - ${ex.title}</span><span style="font-size:12px;color:#666">${ex.wordCount}词</span></div>`).join('')}
        </div>
      `;
    }

    // ============== 事件处理 ==============
    function switchTab(tab) {
      currentTab = tab;
      currentModule = null;
      currentIndex = 0;
      selectedAnswer = null;
      submitted = false;
      document.querySelectorAll('.nav-tab').forEach((t, i) => {
        t.classList.toggle('active', ['listening','reading','writing'][i] === tab);
      });
      render();
    }

    function selectModule(module) {
      currentModule = module;
      currentIndex = 0;
      selectedAnswer = null;
      submitted = false;
      render();
    }

    function selectQuestion(index) {
      currentIndex = index;
      selectedAnswer = null;
      submitted = false;
      render();
    }

    function selectAnswer(answer) {
      if (submitted) return;
      selectedAnswer = answer;
      render();
    }

    function submitAnswer() {
      submitted = true;
      render();
    }

    function nextQuestion() {
      const questions = listeningData[currentModule] || [];
      if (currentIndex < questions.length - 1) {
        currentIndex++;
        selectedAnswer = null;
        submitted = false;
        render();
      } else {
        backToList();
      }
    }

    function backToList() {
      currentModule = null;
      currentIndex = 0;
      selectedAnswer = null;
      submitted = false;
      render();
    }

    function backToModules() {
      currentModule = null;
      currentIndex = 0;
      selectedAnswer = null;
      submitted = false;
      render();
    }

    function setFilter(type) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
    }

    function selectReadingModule(module) {
      currentModule = module;
      currentIndex = 0;
      render();
    }

    function selectReadingQuestion(index) {
      currentIndex = index;
      render();
    }

    function backToReadingList() {
      currentModule = null;
      currentIndex = 0;
      render();
    }

    function selectWritingExercise(index) {
      currentModule = index;
      writingContent = '';
      showSample = false;
      render();
    }

    function backToWritingList() {
      currentModule = null;
      writingContent = '';
      showSample = false;
      render();
    }

    function updateWritingContent(content) {
      writingContent = content;
      render();
    }

    function toggleSample() {
      showSample = !showSample;
      render();
    }

    function clearWriting() {
      writingContent = '';
      showSample = false;
      render();
    }

    // ============== 初始化 ==============
    render();
  </script>
</body>
</html>
